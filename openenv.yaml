name: monsoon-floodgate-control
version: "1.0.0"
description: >
  Multi-agent stormwater gate and pump control for Mumbai flood prevention.
  Simulates real-time management of 3 interconnected sub-basins during
  erratic monsoon events (inspired by Dharavi flood-risk zones).
  Agents receive partial observability of neighbouring basins and must
  coordinate gate/pump settings to minimise flooding while conserving energy.

author: "Monsoon Flood Gate Control Team"
license: MIT
tags:
  - openenv
  - real-world
  - multi-agent
  - partial-observability
  - stormwater
  - climate
  - india

tasks:
  - id: task_easy
    name: "Single-Peak Monsoon Response"
    difficulty: easy
    description: >
      A single smooth monsoon burst over 6 hours. Predictable forecast,
      linear rainfall ramp. Agent must proactively drain basin before peak.
    reward_range: [-2.5, 0.65]
    max_steps: 72
    grader: deterministic

  - id: task_medium
    name: "Double-Burst Storm Coordination"
    difficulty: medium
    description: >
      Two storm bursts separated by a lull. Agents must drain during lull
      to create buffer capacity. Forecast has ±30% noise. Requires
      inter-basin coordination signal reading.
    reward_range: [-2.5, 0.65]
    max_steps: 72
    grader: deterministic

  - id: task_hard
    name: "Erratic Extreme Event (Dharavi Worst-Case)"
    difficulty: hard
    description: >
      Simulates an extreme Mumbai rainfall event: sudden spikes up to
      200mm/hr, unpredictable drops, rising downstream river level.
      Partial observability of neighbours is most limiting here.
    reward_range: [-2.5, 0.65]
    max_steps: 72
    grader: deterministic

observation_space:
  type: object
  fields:
    basin_id: {type: int, description: "Which sub-basin (0–2)"}
    water_level_m: {type: float, range: [0, 2.2], description: "Current water depth in metres"}
    water_level_fraction: {type: float, range: [0.0, 1.1], description: "water_level / capacity"}
    rainfall_mm_per_hr: {type: float, range: [0, 250], description: "Live rain gauge reading"}
    river_level_m: {type: float, range: [0.3, 3.5], description: "Downstream river level"}
    gate_positions: {type: array, items: float, length: 3, range: [0.0, 1.0]}
    pump_speeds: {type: array, items: float, length: 2, range: [0.0, 1.0]}
    is_flooding: {type: bool}
    neighbors: {type: array, description: "Partial, noisy view of other basins"}
    timestep: {type: int, range: [0, 72]}
    elapsed_minutes: {type: float, range: [0, 360]}
    storm_phase: {type: str, enum: [pre_monsoon, peak, recession, clear]}
    rainfall_forecast: {type: array, items: float, length: 3, description: "Noisy 3-step forecast"}

action_space:
  type: object
  fields:
    gate_positions: {type: array, items: float, length: 3, range: [0.0, 1.0]}
    pump_speeds: {type: array, items: float, length: 2, range: [0.0, 1.0]}

reward:
  type: shaped
  components:
    flood_penalty: "Negative reward when water exceeds capacity (−2.0 when flooding)"
    drainage_bonus: "Positive reward for net outflow exceeding inflow"
    energy_cost: "Negative reward proportional to pump energy used"
    gate_chatter_penalty: "Negative reward for rapid gate oscillation"
    forecast_bonus: "Positive reward for proactive draining before forecast peaks"
  range: [-2.5, 0.65]
  partial_progress: true

endpoints:
  reset: {method: POST, path: /reset}
  step: {method: POST, path: /step}
  state: {method: GET, path: /state}
  health: {method: GET, path: /health}
  tasks: {method: GET, path: /tasks}
  grade: {method: GET, path: /grade}
  info: {method: GET, path: /info}

docker:
  base_image: python:3.11-slim
  port: 8000
  health_check: /health

huggingface:
  space_sdk: docker
  tags:
    - openenv
    - reinforcement-learning
    - climate
    - multi-agent
