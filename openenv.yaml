openenv_version: "1.0"

name: atc-tracon-rl
version: "1.0.0"
description: >
  Reinforcement Learning environment for Air Traffic Control decision support
  in TRACON (Terminal Radar Approach Control) scenarios. Provides minimal,
  interpretable advisory actions to assist human controllers.

author: "ATC RL Team"
license: MIT

tasks:
  - id: wake_turbulence
    name: Wake Turbulence Separation
    description: >
      Maintain safe wake-turbulence spacing between sequenced aircraft
      by issuing heading or speed adjustments.
    observation_space:
      type: structured
      fields:
        - name: aircraft
          type: array[AircraftState]
        - name: separation_matrix
          type: dict[string, float]
    action_space:
      type: structured
      allowed_actions:
        - heading_change
        - speed_change
        - sequence_swap
    reward:
      type: continuous
      range: [0.0, 1.0]
      description: >
        Mean ratio of actual vs required separation across all consecutive pairs.

  - id: go_around_prevention
    name: Go-Around Prevention via Sequencing
    description: >
      Optimise landing order so faster aircraft lead slower ones,
      preventing go-arounds and fuel emergencies.
    observation_space:
      type: structured
      fields:
        - name: aircraft
          type: array[AircraftState]
    action_space:
      type: structured
      allowed_actions:
        - sequence_swap
        - speed_change
    reward:
      type: continuous
      range: [0.0, 1.0]
      description: >
        Fraction of correctly ordered pairs with a fuel-state bonus.

  - id: emergency_vectoring
    name: Emergency Vectoring
    description: >
      Vector a MAYDAY aircraft to the runway as quickly as possible,
      clearing traffic and aligning the aircraft correctly.
    observation_space:
      type: structured
      fields:
        - name: aircraft
          type: array[AircraftState]
        - name: runways
          type: array[RunwayState]
    action_space:
      type: structured
      allowed_actions:
        - vector
        - heading_change
        - sequence_swap
    reward:
      type: continuous
      range: [0.0, 1.0]
      description: >
        Weighted combination of runway proximity, heading alignment,
        and fuel urgency for the emergency aircraft.

  - id: conflict_resolution
    name: Conflict Alert Resolution
    description: >
      Resolve lateral and vertical conflicts between aircraft using
      the fewest and smallest corrective actions.
    observation_space:
      type: structured
      fields:
        - name: aircraft
          type: array[AircraftState]
        - name: active_conflicts
          type: array[ConflictInfo]
    action_space:
      type: structured
      allowed_actions:
        - heading_change
        - altitude_change
        - speed_change
    reward:
      type: continuous
      range: [0.0, 1.0]
      description: >
        1 - (active_conflicts / number_of_aircraft).

  - id: gate_assignment
    name: Gate / Stand Assignment
    description: >
      Assign landed aircraft to compatible, unoccupied gates efficiently.
    observation_space:
      type: structured
      fields:
        - name: aircraft
          type: array[AircraftState]
        - name: gates
          type: array[GateState]
    action_space:
      type: structured
      allowed_actions:
        - assign_gate
    reward:
      type: continuous
      range: [0.0, 1.0]
      description: >
        Weighted combination of assignment rate and gate compatibility.

api:
  endpoints:
    reset:
      method: POST
      path: /reset
      request_schema: ResetRequest
      response_schema: EnvironmentState
    step:
      method: POST
      path: /step
      request_schema: StepRequest
      response_schema: StepResult
    state:
      method: GET
      path: /state
      response_schema: EnvironmentState
    health:
      method: GET
      path: /health
      response_schema: HealthResponse

environment:
  observation_type: structured_json
  action_type: structured_json
  reward_range: [0.0, 1.0]
  max_steps: 30
  deterministic: false

models:
  typed: true
  library: pydantic
  schema_file: models.py

inference:
  script: inference.py
  required_env_vars:
    - API_BASE_URL
    - MODEL_NAME
    - HF_TOKEN
  log_format:
    start_token: "[START]"
    step_token: "[STEP]"
    end_token: "[END]"
