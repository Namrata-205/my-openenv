name: atc-tracon-rl
version: "1.2.0"
description: >
  Air Traffic Control (ATC) TRACON RL Environment.
  Five procedural tasks covering wake-turbulence separation, go-around
  prevention, emergency vectoring, conflict resolution, and gate assignment.
  Scores are normalised to [0, 1] per episode.

server:
  dockerfile: Dockerfile
  port: 7860
  healthcheck:
    path: /health
    interval: 10s
    timeout: 5s
    retries: 5

endpoints:
  reset:
    method: POST
    path: /reset
    description: Reset the environment and return the initial state.
    request_schema:
      type: object
      properties:
        task:
          type: string
          enum:
            - wake_turbulence
            - go_around_prevention
            - emergency_vectoring
            - conflict_resolution
            - gate_assignment
          description: Task to run. Omit to choose randomly.
        seed:
          type: integer
          description: Optional RNG seed for reproducibility.
        options:
          type: object
          description: Extra options forwarded to the environment (e.g. max_steps).

  step:
    method: POST
    path: /step
    description: Advance the environment by one step.
    request_schema:
      type: object
      required: [actions]
      properties:
        actions:
          type: array
          items:
            type: object
            required: [action_type, target_callsign]
            properties:
              action_type:
                type: string
                enum:
                  - speed_change
                  - heading_change
                  - altitude_change
                  - sequence_swap
                  - assign_gate
                  - vector
                  - no_action
              target_callsign:
                type: string
              value:
                type: number
              gate_id:
                type: string
              rationale:
                type: string

  state:
    method: GET
    path: /state
    description: Return the current state without advancing the episode.

  tasks:
    method: GET
    path: /tasks
    description: Return list of all supported task names.

tasks:
  - name: wake_turbulence
    description: >
      Maintain FAA-compliant wake-turbulence separation between a leading
      and trailing aircraft pair.
    max_steps: 40
    score_range: [0.0, 1.0]
    reward_shaping:
      perfect_spacing: +15
      loss_of_separation: -25

  - name: go_around_prevention
    description: >
      Optimise the inbound landing sequence to prevent go-arounds while
      managing fuel-critical aircraft.
    max_steps: 40
    score_range: [0.0, 1.0]
    reward_shaping:
      low_go_around_rate: +12
      per_go_around: -20
      holding_per_min: -8

  - name: emergency_vectoring
    description: >
      Vector a MAYDAY aircraft to the runway conflict-free as quickly as
      possible.
    max_steps: 40
    score_range: [0.0, 1.0]
    reward_shaping:
      fast_clean_insertion: +18
      conflict_penalty: -22

  - name: conflict_resolution
    description: >
      Resolve converging aircraft pair with minimal heading or speed
      corrections.
    max_steps: 40
    score_range: [0.0, 1.0]
    reward_shaping:
      safely_separated_on_course: +10
      critical_proximity: -15

  - name: gate_assignment
    description: >
      Assign arriving aircraft to the best available compatible gate
      from the pool A1, A2, B1, B2, C1, C2.
    max_steps: 40
    score_range: [0.0, 1.0]
    reward_shaping:
      quick_valid_assignment: +15
      occupied_or_incompatible: -20

environment_variables:
  required: []
  optional:
    - name: API_BASE_URL
      description: URL of the running environment server.
      default: "http://localhost:7860"
    - name: MODEL_NAME
      description: LLM model identifier used by inference.py.
      default: "mistralai/Mistral-7B-Instruct-v0.2"
    - name: HF_TOKEN
      description: HuggingFace API token for LLM inference.
    - name: GROK_API_KEY
      description: xAI Grok API key for secondary LLM fallback.
    - name: GROK_MODEL
      description: Grok model identifier.
      default: "grok-3-mini"